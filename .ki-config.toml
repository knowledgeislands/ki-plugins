# Knowledge Islands repo config — read by the ki-repo skill.
# One [table] per skill that needs per-repo options.
[ki-repo]
supported_runtimes = ["claude-code", "codex"]
visibility = "public"   # public so Cowork's extraKnownMarketplaces github source can reach it

# The authoring standard (Markdown/TOML house style) is baseline for every KI repo —
# declared explicitly, not assumed. Presence is the compliance marker.
[ki-authoring]

# This IS the plugin-marketplace repo shape (.claude-plugin/marketplace.json), so it declares
# its one repo-structure standard: the ki-plugins skill governs the on-disk projection.
# ki-binding (an environment skill) owns generation + cross-surface enablement, not a repo table.
[ki-plugins]

# This repo is a generated Claude plugin marketplace (the Cowork projection of the
# ki-agentic-harness). It ships no TypeScript toolchain of its own — its skills/ and
# agents/ are generated by the harness's ki:binding:build-plugin generator, never
# hand-maintained. So it declares no ki-engineering / ki-skills / ki-agents governance
# here: those standards are enforced at the source (the harness), not on the projection.

# The standard's topic set (typescript/bun/mcp) describes source repos; this is a plugin projection.
[ki-repo.checks]
topics = false

# KNOWN DIVERGENCE (not overridable): ki-repo wants PUBLIC repos under MIT, but this repo
# projects the proprietary ki-agentic-harness content and keeps its "all rights reserved"
# LICENSE (public-but-not-open). The audit will report one [license] FAIL until this is
# resolved — either relicense the projected content, or make the repo private if Cowork can
# reach a private marketplace source. Left for a deliberate decision, not silently flipped to MIT.
